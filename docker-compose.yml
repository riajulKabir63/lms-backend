version: '3.8'

services:
  db:
    image: postgres:latest
    container_name: lms-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lms
    ports:
      - "5433:5432"
    volumes:
      - lms-db-data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"   # App connection port
      - "15672:15672" # UI Dashboard port

  backend:
    build: .
    container_name: lms-backend
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/lms
      SPRING_DATA_REDIS_HOST: redis
      SPRING_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      - db
      - redis
      - rabbitmq

  frontend:
    image: node:20-alpine
    container_name: lms-frontend-dev
    working_dir: /app
    ports:
      - "4200:4200"
    volumes:
      - ../lms-frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npx ng serve --host 0.0.0.0"
    depends_on:
      - backend
volumes:
  lms-db-data: